name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m compileall -q src
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy src
      - run: python -m pytest --cov=venice_media_skill --cov-report=term-missing
      - run: python -m venice_media_skill validate-openapi references/venice-openapi.yaml
      - run: python -m build
      - name: Inspect sdist for forbidden entries
        run: python scripts/inspect-sdist.py
      - name: Verify bundled skill/reference mirrors
        run: python scripts/verify-bundled-assets.py
      - name: Inspect sdist contents
        run: |
          python -m build --sdist
          set -e
          SDIST="$(ls -1 dist/*.tar.gz | head -n1)"
          echo "sdist: $SDIST"
          python - <<'PY'
          import re, sys, tarfile
          with tarfile.open(sys.argv[1]) as tf:
              names = tf.getnames()
              members = tf.getmembers()
          forbidden_tokens = [
              ".venv/", "venv/", ".audit-venv/", "audit-venv/",
              "__pycache__/", "/.git/", "node_modules/", "/.env",
              "/.envrc", "/secrets/", "/credentials/",
          ]
          forbidden_ext = (".key", ".pem", ".pfx", ".p12")
          hits: list[str] = []
          for n in names:
              if any(tok in n for tok in forbidden_tokens) or n.endswith(forbidden_ext):
                  hits.append(f"forbidden-path: {n}")
          for m in members:
              if m.issym() or m.islnk():
                  if m.linkname.startswith("/") or re.match(r"^[A-Z]:[\\/]", m.linkname):
                      hits.append(f"absolute-symlink: {m.name} -> {m.linkname}")
                  elif not m.linkname.startswith((".", "/")) and "/" in m.linkname:
                      # Symlinks that point outside the working tree are suspect.
                      hits.append(f"external-symlink: {m.name} -> {m.linkname}")
          if hits:
              print("SDIST REJECTED:")
              for h in hits:
                  print(" -", h)
              sys.exit(1)
          print(f"sdist OK: {len(names)} entries, no forbidden paths / symlinks.")
          PY

  cross-platform-smoke:
    name: Smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m venice_media_skill schema
      - run: python -m venice_media_skill validate-openapi references/venice-openapi.yaml
      - run: python -m venice_media_skill doctor
        env:
          VENICE_MEDIA_CONFIG_DIR: ${{ runner.temp }}/venice-media/config
          VENICE_MEDIA_CACHE_DIR: ${{ runner.temp }}/venice-media/cache
          VENICE_MEDIA_STATE_DIR: ${{ runner.temp }}/venice-media/state
          VENICE_MEDIA_OUTPUT_DIR: ${{ runner.temp }}/venice-media/output

  wheel-smoke:
    name: Wheel install smoke / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - name: Build wheel + sdist
        run: python -m build
      - name: Install wheel in fresh venv (no -e flag)
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/python -m pip install --upgrade pip
          /tmp/wheel-venv/bin/python -m pip install dist/venice_media_skill-*-py3-none-any.whl
      - name: Smoke the installed console script + bundled assets
        run: |
          set -e
          /tmp/wheel-venv/bin/venice-media --help >/dev/null
          /tmp/wheel-venv/bin/venice-media schema >/dev/null
          /tmp/wheel-venv/bin/venice-media validate-openapi "$(pwd)/references/venice-openapi.yaml"
          /tmp/wheel-venv/bin/python -c "
          from importlib import resources
          root = resources.files('venice_media_skill.assets.skill')
          assert (root / 'SKILL.md').is_file(), 'SKILL.md missing'
          assert (root / 'references' / 'venice-openapi.yaml').is_file(), \
              'bundled OpenAPI yaml missing'
          print('wheel-smoke: bundled assets reachable via importlib.resources')
          "

  minimum-deps:
    name: Lower-bound deps / Python 3.13
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pins matching pyproject.toml lower bounds
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "httpx==0.28.1" \
            "platformdirs==4.3.6" \
            "PyYAML==6.0.2"
          python -m pip install -e .
      - name: Smoke the bridge against the lowest acceptable dependencies
        run: |
          python -c "import httpx, platformdirs, yaml; \
            assert httpx.__version__ == '0.28.1'; \
            assert tuple(int(p) for p in platformdirs.__version__.split('.')[:2]) >= (4, 3); \
            assert tuple(int(p) for p in yaml.__version__.split('.')[:2]) >= (6, 0)"
          python -m venice_media_skill --help >/dev/null
          python -m venice_media_skill schema >/dev/null
          echo "minimum-deps: lower-bound httpx/platformdirs/PyYAML imports cleanly"
          VENICE_MEDIA_CONFIG_DIR: ${{ runner.temp }}/venice-media/config
          VENICE_MEDIA_CACHE_DIR: ${{ runner.temp }}/venice-media/cache
          VENICE_MEDIA_STATE_DIR: ${{ runner.temp }}/venice-media/state
          VENICE_MEDIA_OUTPUT_DIR: ${{ runner.temp }}/venice-media/output
