name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ./scripts/validate.sh
      - name: Build source repository archives
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=zip --prefix="venice-media-skill-${VERSION}/" \
            --output="dist/venice-media-skill-${VERSION}-source.zip" HEAD
          git archive --format=tar.gz --prefix="venice-media-skill-${VERSION}/" \
            --output="dist/venice-media-skill-${VERSION}-source.tar.gz" HEAD
          (cd dist && sha256sum * > SHA256SUMS.txt)
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
